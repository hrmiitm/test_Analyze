<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Analysis Result</title>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,"Helvetica Neue",Arial;max-width:900px;margin:2rem auto;padding:1rem}
    pre{background:#f6f8fa;padding:1rem;border-radius:6px;overflow:auto}
  </style>
</head>
<body>
  <h1>Analysis Result</h1>
  <p>This page shows the JSON output produced by <code>execute.py</code> when run in CI and published to GitHub Pages.</p>
  <div id="status">Loading result.json…</div>
  <pre id="output"></pre>

  <script>
    async function load() {
      try {
        const resp = await fetch('./result.json', {cache: 'no-store'});
        if (!resp.ok) {
          document.getElementById('status').textContent = 'result.json not found on Pages yet.';
          return;
        }
        const data = await resp.json();
        document.getElementById('status').textContent = 'Loaded result.json';
        document.getElementById('output').textContent = JSON.stringify(data, null, 2);
      } catch (err) {
        document.getElementById('status').textContent = 'Error loading result.json';
        document.getElementById('output').textContent = String(err);
      }
    }
    load();
  </script>
</body>
</html>
