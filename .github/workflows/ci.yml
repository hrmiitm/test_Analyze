name: CI

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff pandas==2.3.0

      - name: Run ruff
        run: |
          echo "Running ruff..."
          ruff check . || true

      - name: Run execute.py to produce result.json
        run: |
          echo "Running execute.py..."
          python execute.py > result.json

      - name: Show result.json (short)
        run: |
          echo "---- result.json preview ----"
          head -n 200 result.json || true

      - name: Upload artifact for GitHub Pages
        uses: actions/upload-pages-artifact@v1
        with:
          path: result.json

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v1
